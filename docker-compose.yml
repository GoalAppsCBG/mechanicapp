services:
  db:
    image: postgres:15
    container_name: mechanic_db_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_DB: ${POSTGRES_DB:-mechanic_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mechanic_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: mechanic_backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-mechanic_db};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-12345678};Minimum Pool Size=2;Maximum Pool Size=20;Timeout=30;Command Timeout=30
      - ASPNETCORE_URLS=http://+:80
    volumes:
      - uploads_data:/app/wwwroot/uploads
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mechanic_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  backup:
    image: postgres:15
    container_name: mechanic_db_backup
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-12345678}
      PGDATABASE: ${POSTGRES_DB:-mechanic_db}
    volumes:
      - db_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          FILENAME="/backups/mechanic_db_$$(date +%Y%m%d_%H%M%S).dump"
          echo "[backup] Starting pg_dump at $$(date)..."
          pg_dump -Fc --clean --if-exists --no-owner --no-privileges -f "$$FILENAME"
          if [ $$? -eq 0 ]; then
            echo "[backup] Success: $$FILENAME"
            ls -1t /backups/*.dump 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null
          else
            echo "[backup] FAILED at $$(date)"
          fi
          sleep 86400
        done
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  db_backups:
